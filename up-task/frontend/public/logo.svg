<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3EC6E0"/>
      <stop offset="100%" stop-color="#1E5BD8"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#66E07A"/>
      <stop offset="100%" stop-color="#2DBE60"/>
    </linearGradient>

  </defs>

  <!-- Tarjetas de proyectos -->
  <rect x="260" y="140" width="150" height="200" rx="25" fill="url(#greenGrad)" />
  <rect x="210" y="120" width="150" height="200" rx="25" fill="url(#orangeGrad)" />
  <rect x="160" y="100" width="170" height="220" rx="30" fill="url(#blueGrad)" />

  <!-- Lineas simulando tareas -->
  <rect x="190" y="130" width="80" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="190" y="150" width="120" height="8" rx="4" fill="white" opacity="0.8"/>

  <!-- Check principal -->
  <path d="M180 250 L240 310 L360 180"
        stroke="white"
        stroke-width="28"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Circulos decorativos tipo workflow -->
  <circle cx="190" cy="70" r="10" fill="#2F80ED"/>
  <circle cx="260" cy="70" r="10" fill="#FF7A00"/>
  <circle cx="330" cy="70" r="10" fill="#2DBE60"/>

</svg>